name: Build Android apps

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  pull_request:
    branches:
      - main
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  workflow_dispatch:

jobs:
  build-android:
    name: Build phone + Android TV APKs
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # No gradle wrapper is checked in; pin Gradle via setup-gradle instead.
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.9"

      - name: Unit tests
        run: gradle :core:testDebugUnitTest :mobile:testDebugUnitTest :tv:testDebugUnitTest --stacktrace

      - name: Assemble debug APKs
        run: gradle :mobile:assembleDebug :tv:assembleDebug --stacktrace

      - name: Upload phone APK
        uses: actions/upload-artifact@v4
        with:
          name: ftp-anime-player-mobile-apk
          path: android/mobile/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload Android TV APK
        uses: actions/upload-artifact@v4
        with:
          name: ftp-anime-player-tv-apk
          path: android/tv/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Attach APKs to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/mobile/build/outputs/apk/debug/*.apk
            android/tv/build/outputs/apk/debug/*.apk
