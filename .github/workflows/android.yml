name: android

on:
  push:
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  pull_request:
    paths:
      - "android/**"
      - ".github/workflows/android.yml"

jobs:
  gradle:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      # The repo does not check in a gradle wrapper (too many binaries for a
      # scaffolding task). Install gradle directly via gradle-build-action,
      # which matches the Gradle version declared in android/build.gradle.kts.
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.9"
      - name: Assemble debug APKs
        run: gradle :mobile:assembleDebug :tv:assembleDebug --stacktrace
      - name: Unit tests
        run: gradle :core:testDebugUnitTest :mobile:testDebugUnitTest :tv:testDebugUnitTest --stacktrace
