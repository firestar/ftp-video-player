name: Build Apple apps

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "apple/**"
      - ".github/workflows/apple.yml"
  pull_request:
    branches:
      - main
    paths:
      - "apple/**"
      - ".github/workflows/apple.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  test-core:
    name: Test FtpAnimeCore package
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Show Xcode version
        run: xcodebuild -version
      - name: swift test
        working-directory: apple/Packages/FtpAnimeCore
        run: swift test

  build-ios:
    name: Build iOS/iPadOS app
    runs-on: macos-14
    needs: test-core
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        working-directory: apple/iOS
        run: |
          set -o pipefail
          brew install xcodegen 2>&1 | tee install.log
      - name: Generate xcodeproj
        working-directory: apple/iOS
        run: |
          set -o pipefail
          xcodegen generate 2>&1 | tee xcodegen.log
          ls -la 2>&1 | tee -a xcodegen.log
      - name: List schemes
        working-directory: apple/iOS
        run: |
          set -o pipefail
          xcodebuild -project FtpAnimePlayer-iOS.xcodeproj -list 2>&1 | tee list.log
      - name: Build for simulator
        working-directory: apple/iOS
        run: |
          set -o pipefail
          xcodebuild \
            -project FtpAnimePlayer-iOS.xcodeproj \
            -scheme FtpAnimePlayer-iOS \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY= \
            build 2>&1 | tee build.log
      - name: Post logs on failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const files = ['install.log', 'xcodegen.log', 'list.log', 'build.log'];
            let body = '### iOS build failure\n';
            for (const f of files) {
              const p = `apple/iOS/${f}`;
              let content = '(step did not run)';
              try {
                content = fs.readFileSync(p, 'utf8');
                const lines = content.split('\n');
                if (lines.length > 200) content = '...\n' + lines.slice(-200).join('\n');
              } catch (_) {}
              body += `\n<details><summary><code>${f}</code></summary>\n\n\`\`\`\n${content}\n\`\`\`\n</details>\n`;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
      - name: Upload iOS .app bundle
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ftp-anime-player-ios-app
          path: apple/iOS/build/Build/Products/Debug-iphonesimulator/*.app
          if-no-files-found: error

  build-tvos:
    name: Build tvOS app
    runs-on: macos-14
    needs: test-core
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        working-directory: apple/tvOS
        run: |
          set -o pipefail
          brew install xcodegen 2>&1 | tee install.log
      - name: Generate xcodeproj
        working-directory: apple/tvOS
        run: |
          set -o pipefail
          xcodegen generate 2>&1 | tee xcodegen.log
          ls -la 2>&1 | tee -a xcodegen.log
      - name: List schemes
        working-directory: apple/tvOS
        run: |
          set -o pipefail
          xcodebuild -project FtpAnimePlayer-tvOS.xcodeproj -list 2>&1 | tee list.log
      - name: Build for simulator
        working-directory: apple/tvOS
        run: |
          set -o pipefail
          xcodebuild \
            -project FtpAnimePlayer-tvOS.xcodeproj \
            -scheme FtpAnimePlayer-tvOS \
            -destination 'generic/platform=tvOS Simulator' \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY= \
            build 2>&1 | tee build.log
      - name: Post logs on failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const files = ['install.log', 'xcodegen.log', 'list.log', 'build.log'];
            let body = '### tvOS build failure\n';
            for (const f of files) {
              const p = `apple/tvOS/${f}`;
              let content = '(step did not run)';
              try {
                content = fs.readFileSync(p, 'utf8');
                const lines = content.split('\n');
                if (lines.length > 200) content = '...\n' + lines.slice(-200).join('\n');
              } catch (_) {}
              body += `\n<details><summary><code>${f}</code></summary>\n\n\`\`\`\n${content}\n\`\`\`\n</details>\n`;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
      - name: Upload tvOS .app bundle
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ftp-anime-player-tvos-app
          path: apple/tvOS/build/Build/Products/Debug-appletvsimulator/*.app
          if-no-files-found: error
