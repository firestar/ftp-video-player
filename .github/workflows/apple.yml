name: Build Apple apps

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "apple/**"
      - ".github/workflows/apple.yml"
  pull_request:
    branches:
      - main
    paths:
      - "apple/**"
      - ".github/workflows/apple.yml"
  workflow_dispatch:

jobs:
  test-core:
    name: Test FtpAnimeCore package
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Show Xcode version
        run: xcodebuild -version
      - name: swift test
        working-directory: apple/Packages/FtpAnimeCore
        run: swift test

  build-ios:
    name: Build iOS/iPadOS app
    runs-on: macos-14
    needs: test-core
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate xcodeproj
        working-directory: apple/iOS
        run: |
          xcodegen generate --quiet
          ls -la
      - name: List schemes
        working-directory: apple/iOS
        run: xcodebuild -project FtpAnimePlayer-iOS.xcodeproj -list
      - name: Build for simulator
        id: build
        working-directory: apple/iOS
        run: |
          xcodebuild \
            -project FtpAnimePlayer-iOS.xcodeproj \
            -scheme FtpAnimePlayer-iOS \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY= \
            build > build.log 2>&1
          status=$?
          if [ $status -ne 0 ]; then
            echo "::group::xcodebuild failure output"
            cat build.log
            echo "::endgroup::"
          fi
          exit $status
      - name: Post build log on failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('apple/iOS/build.log', 'utf8');
            const tail = log.split('\n').slice(-150).join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### iOS build failure — last 150 lines of xcodebuild output\n\n\`\`\`\n${tail}\n\`\`\``
            });
      - name: Upload iOS .app bundle
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ftp-anime-player-ios-app
          path: apple/iOS/build/Build/Products/Debug-iphonesimulator/*.app
          if-no-files-found: error

  build-tvos:
    name: Build tvOS app
    runs-on: macos-14
    needs: test-core
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate xcodeproj
        working-directory: apple/tvOS
        run: |
          xcodegen generate --quiet
          ls -la
      - name: List schemes
        working-directory: apple/tvOS
        run: xcodebuild -project FtpAnimePlayer-tvOS.xcodeproj -list
      - name: Build for simulator
        id: build
        working-directory: apple/tvOS
        run: |
          xcodebuild \
            -project FtpAnimePlayer-tvOS.xcodeproj \
            -scheme FtpAnimePlayer-tvOS \
            -destination 'generic/platform=tvOS Simulator' \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY= \
            build > build.log 2>&1
          status=$?
          if [ $status -ne 0 ]; then
            echo "::group::xcodebuild failure output"
            cat build.log
            echo "::endgroup::"
          fi
          exit $status
      - name: Post build log on failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('apple/tvOS/build.log', 'utf8');
            const tail = log.split('\n').slice(-150).join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### tvOS build failure — last 150 lines of xcodebuild output\n\n\`\`\`\n${tail}\n\`\`\``
            });
      - name: Upload tvOS .app bundle
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ftp-anime-player-tvos-app
          path: apple/tvOS/build/Build/Products/Debug-appletvsimulator/*.app
          if-no-files-found: error
