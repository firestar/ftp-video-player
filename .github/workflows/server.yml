name: Build backend server

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "server/**"
      - ".github/workflows/server.yml"
  pull_request:
    branches:
      - main
    paths:
      - "server/**"
      - ".github/workflows/server.yml"
  workflow_dispatch:

jobs:
  build-server:
    name: Build + test Spring Boot server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      # ffmpeg + ffprobe are needed for the streaming integration tests (once
      # added) and for local manual verification. Cheap to install and keeps
      # the environment identical to production.
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Maven verify
        run: mvn -B verify

      - name: Upload server JAR
        uses: actions/upload-artifact@v4
        with:
          name: ftp-anime-player-server-jar
          path: server/target/*.jar
          if-no-files-found: error

      - name: Attach JAR to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: server/target/*.jar
