name: server

on:
  push:
    paths:
      - "server/**"
      - ".github/workflows/server.yml"
  pull_request:
    paths:
      - "server/**"
      - ".github/workflows/server.yml"

jobs:
  maven:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      # ffmpeg + ffprobe are only needed for the streaming integration tests,
      # but it's cheap to install and keeps the CI green once those tests are
      # added. Remove if build time starts to matter.
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: mvn -B verify
