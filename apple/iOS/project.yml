# XcodeGen spec for the iOS/iPadOS app target. Run `xcodegen generate` from
# this directory to produce FtpAnimePlayer-iOS.xcodeproj.
name: FtpAnimePlayer-iOS
options:
  bundleIdPrefix: com.ftpanimeplayer
  deploymentTarget:
    iOS: "16.0"
packages:
  FtpAnimeCore:
    path: ../Packages/FtpAnimeCore
targets:
  FtpAnimePlayer-iOS:
    type: application
    platform: iOS
    # Universal app — one binary, iPhone + iPad layouts driven off size classes.
    supportedDestinations: [iPhone, iPad]
    deploymentTarget: "16.0"
    sources:
      - path: Sources
    resources:
      - path: Resources
        optional: true
    info:
      path: Info.plist
      properties:
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # The app talks to a user-hosted Spring Boot backend, which may be
        # plain HTTP on the LAN. Allow arbitrary loads so the AVPlayer can
        # fetch HLS over local HTTP; users with TLS can still point at https.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    dependencies:
      - package: FtpAnimeCore
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"
        PRODUCT_BUNDLE_IDENTIFIER: com.ftpanimeplayer.iOS
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
