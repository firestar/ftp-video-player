# Minimal XcodeGen spec for the iOS/iPadOS app. Run `xcodegen generate` to
# produce FtpAnimePlayer-iOS.xcodeproj.
name: FtpAnimePlayer-iOS
options:
  bundleIdPrefix: com.ftpanimeplayer
  deploymentTarget:
    iOS: "16.0"
targets:
  FtpAnimePlayer-iOS:
    type: application
    platform: iOS
    sources:
      - path: Sources
    # No `info.path` — let Xcode auto-generate Info.plist via
    # GENERATE_INFOPLIST_FILE (the Xcode 13+ default for apps).
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"
        PRODUCT_BUNDLE_IDENTIFIER: com.ftpanimeplayer.iOS
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
