# XcodeGen spec for the iOS/iPadOS app target. Run `xcodegen generate` from
# this directory to produce FtpAnimePlayer-iOS.xcodeproj.
name: FtpAnimePlayer-iOS
options:
  bundleIdPrefix: com.ftpanimeplayer
  deploymentTarget:
    iOS: "16.0"
packages:
  FtpAnimeCore:
    path: ../Packages/FtpAnimeCore
targets:
  FtpAnimePlayer-iOS:
    type: application
    platform: iOS
    # Universal app. `TARGETED_DEVICE_FAMILY = 1,2` builds a single binary
    # that the App Store delivers to iPhone (1) and iPad (2).
    sources:
      - path: Sources
    info:
      path: Info.plist
      properties:
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # The app talks to a user-hosted Spring Boot backend which may be
        # plain HTTP on the LAN. Allow arbitrary loads so AVPlayer can fetch
        # HLS over local HTTP; users with TLS can still point at https.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    dependencies:
      - package: FtpAnimeCore
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"
        PRODUCT_BUNDLE_IDENTIFIER: com.ftpanimeplayer.iOS
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
