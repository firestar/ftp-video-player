# XcodeGen spec for the Apple TV app. Run `xcodegen generate` here to
# produce FtpAnimePlayer-tvOS.xcodeproj.
name: FtpAnimePlayer-tvOS
options:
  bundleIdPrefix: com.ftpanimeplayer
  deploymentTarget:
    tvOS: "16.0"
targets:
  FtpAnimePlayer-tvOS:
    type: application
    platform: tvOS
    sources:
      - path: Sources
    info:
      path: Info.plist
      properties:
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ftpanimeplayer.tvOS
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        SWIFT_STRICT_CONCURRENCY: "minimal"
        SWIFT_TREAT_WARNINGS_AS_ERRORS: "NO"
