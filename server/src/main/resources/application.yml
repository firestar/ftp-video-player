server:
  port: ${SYNC_SERVER_PORT:8080}
  # Large video thumbnails and posters can push past the Spring default. The
  # SQLite DB, posters, and thumbnails are uploaded/downloaded as octet-streams,
  # so we bump the request limits well clear of any realistic library size.
  tomcat:
    max-swallow-size: -1
    max-http-form-post-size: -1

spring:
  application:
    name: ftp-anime-player-server
  servlet:
    multipart:
      max-file-size: 2GB
      max-request-size: 2GB
  main:
    banner-mode: off
    web-application-type: servlet

sync:
  data-dir: ${SYNC_DATA_DIR:./data}
  users:
    - username: admin
      password: changeme

# New backend settings — govern FTP proxying, HLS transcoding, and Jikan lookups
# used by the mobile / TV / desktop clients.
player:
  # Absolute paths to ffmpeg / ffprobe. Use the ones on PATH by default.
  ffmpeg-path: ${PLAYER_FFMPEG:ffmpeg}
  ffprobe-path: ${PLAYER_FFPROBE:ffprobe}
  # Working directory for transient HLS segments. Wiped on startup + when
  # streams are unregistered. Keep on fast local storage.
  transcode-dir: ${PLAYER_TRANSCODE_DIR:./data/transcode}
  # Jikan v4 base URL. The hosted service at api.jikan.moe is rate-limited to
  # ~3 req/s; self-hosting replaces this with a LAN mirror.
  jikan-base-url: ${PLAYER_JIKAN_URL:https://api.jikan.moe/v4}
  # Maximum simultaneous HLS transcode sessions. Each spawns one ffmpeg
  # process; on a laptop-class server you'll want this low.
  max-concurrent-transcodes: ${PLAYER_MAX_TRANSCODES:2}

logging:
  level:
    root: INFO
    org.springframework.security: INFO
    com.ftpanimeplayer: INFO
